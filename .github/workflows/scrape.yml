# Scheduled production crawl for the study scraper.
#
# Activation checklist (maintainer, one-time):
#   1. Provision a database (Supabase project or any reachable Postgres).
#   2. Repo Settings -> Secrets and variables -> Actions -> new secret
#        SCRAPER_POSTGRES_URL = postgresql://user:pass@host:5432/db
#      (For Supabase: the connection string from Project Settings ->
#       Database; the session pooler URL works.)
#   3. Optionally adjust the cron below and the dataset codes.
#
# Without the secret, the workflow exits early and green — safe to merge
# before the database exists.

name: scheduled-scrape

on:
  schedule:
    - cron: "0 5 * * 1,4"   # Mon + Thu 05:00 UTC
  workflow_dispatch: {}      # manual trigger from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    # The heavy multi-topic crawl (8 topics x 2 sources + lake) needs
    # headroom: worst case with per-command 15-min caps is ~4h+. Typical
    # runs finish in <30 min; public-repo Actions minutes are free.
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          pip install httpx pydantic pydantic-settings typer PyYAML \
                      "psycopg[binary]" SPARQLWrapper pypdf beautifulsoup4 tenacity

      - name: Check database secret
        id: gate
        env:
          DB: ${{ secrets.SCRAPER_POSTGRES_URL }}
        run: |
          if [ -z "$DB" ]; then
            echo "SCRAPER_POSTGRES_URL secret not set; skipping crawl."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Migrate schema
        if: steps.gate.outputs.enabled == 'true'
        env:
          POSTGRES_URL: ${{ secrets.SCRAPER_POSTGRES_URL }}
        run: python -m study_scraper migrate

      - name: Crawl all sources
        if: steps.gate.outputs.enabled == 'true'
        env:
          POSTGRES_URL: ${{ secrets.SCRAPER_POSTGRES_URL }}
          DIP_API_KEY: ${{ secrets.DIP_API_KEY }}
        run: |
          set +e  # one failing/slow source must not kill the others
          # Topics come from config/topics/topics.csv — adding a topic row
          # auto-adds it to the crawl, no workflow edit needed.
          TOPICS=$(python -c "from study_scraper.config import get_settings; from study_scraper.topics import load_topics; print(' '.join(t.id for t in load_topics(get_settings().topics_csv_path)))")
          echo "crawling topics: $TOPICS"
          # Per-command 15-min cap so a single slow source can't eat the
          # whole budget and starve auto-review/fulltext (exit 124 = timed
          # out; ignored). Worst case stays comfortably under timeout-minutes.
          for topic in $TOPICS; do
            timeout 900 python -m study_scraper run --source ssoar    --topic "$topic" --limit 400
            timeout 900 python -m study_scraper run --source openalex --topic "$topic" --limit 400
            # Bundestag DIP (opinion-policy gap, parliament half). Uses
            # the published public API key unless DIP_API_KEY is set as
            # a repo secret (recommended; the public key rotates).
            timeout 600 python -m study_scraper run --source bundestag_dip --topic "$topic" --limit 200
          done
          timeout 600 python -m study_scraper ingest --source dawum
          timeout 600 python -m study_scraper ingest --source gesis --limit 500
          timeout 600 python -m study_scraper ingest --source eurostat \
              --code env_air_gge --code nrg_bal_s --code demo_pjan
          exit 0

      - name: Auto-review the pending queue (zero-touch)
        if: steps.gate.outputs.enabled == 'true'
        env:
          POSTGRES_URL: ${{ secrets.SCRAPER_POSTGRES_URL }}
        run: |
          # Resolve borderline 'pending' studies to kept/rejected so they
          # flow on to full-text + attribution without waiting on a human.
          python -m study_scraper review auto --limit 1000 || true

      - name: Follow citation graph (one hop)
        if: steps.gate.outputs.enabled == 'true'
        env:
          POSTGRES_URL: ${{ secrets.SCRAPER_POSTGRES_URL }}
        run: |
          # Every topic, not just klima — reference expansion is per-topic
          # collection and each registered question deserves it
          # (audit 2026-07-11). Budget split keeps the step bounded.
          TOPICS=$(python -c "from study_scraper.config import get_settings; from study_scraper.topics import load_topics; print(' '.join(t.id for t in load_topics(get_settings().topics_csv_path)))")
          for topic in $TOPICS; do
            timeout 300 python -m study_scraper follow --fetch --topic "$topic" --limit 40 || true
          done

      - name: Fetch full documents + extract statistics
        if: steps.gate.outputs.enabled == 'true'
        env:
          POSTGRES_URL: ${{ secrets.SCRAPER_POSTGRES_URL }}
        run: |
          python -m study_scraper fulltext --limit 150 || true

      - name: Status report
        if: steps.gate.outputs.enabled == 'true'
        env:
          POSTGRES_URL: ${{ secrets.SCRAPER_POSTGRES_URL }}
        run: |
          python -m study_scraper status
          python -m study_scraper status --json > scrape-status.json

      - name: Answer the registered questions (registry → watches → digest)
        if: steps.gate.outputs.enabled == 'true'
        env:
          POSTGRES_URL: ${{ secrets.SCRAPER_POSTGRES_URL }}
        run: |
          # The product: config/topics/questions.yml is the registry of
          # standing questions (one per topic concern). Sync materializes
          # each as a watch (idempotent upsert), digest answers every
          # watch from ALL relevant attributions and tracks shifts >=5pts
          # vs the previous run, and `questions answer` writes the full
          # per-question answers incl. coverage gaps. Deliberately NOT
          # '|| true': if the answer layer breaks, the run must go red so
          # the monitor agent files a ticket (self-healing philosophy).
          python -m study_scraper questions sync
          python -m study_scraper digest --out opinion-digest.md
          python -m study_scraper questions answer > question-answers.md
          cat question-answers.md

      - name: Upload status artifact
        if: always() && steps.gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scrape-status-${{ github.run_id }}
          path: |
            scrape-status.json
            opinion-digest.md
            question-answers.md
          retention-days: 30
